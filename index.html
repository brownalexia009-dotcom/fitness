<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitRise Fitness</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0b;
    color: white;
}

/* TOP BAR */
header {
    padding: 20px;
    text-align: center;
    background: #111;
    font-size: 20px;
    font-weight: bold;
}

/* HERO */
.hero {
    height: 80vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: linear-gradient(120deg, #28a745, #000);
}

.hero h1 {
    font-size: 3rem;
    margin-bottom: 10px;
}

.hero p {
    font-size: 1.2rem;
    opacity: 0.9;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 15px 30px;
    background: #28a745;
    color: white;
    text-decoration: none;
    border-radius: 30px;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #1f8f39;
    transform: scale(1.05);
}

/* SECTIONS */
.section {
    padding: 50px 20px;
    text-align: center;
}

.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

.card {
    background: #1a1a1a;
    padding: 20px;
    border-radius: 15px;
    width: 250px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    background: #222;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #111;
    margin-top: 40px;
}
</style>
</head>

<body>

<header>
💪 FitRise Fitness
</header>

<div class="hero">
<h1>Transform Your Body</h1>
<p>Workout plans designed for real results</p>

<a class="btn" href="workouts.html">Start Training</a>
</div>

<div class="section">
<h2>🔥 Programs</h2>

<div class="cards">

<div class="card">
<h3>Beginner</h3>
<p>Start your fitness journey the right way.</p>
</div>

<div class="card">
<h3>Fat Loss</h3>
<p>Burn calories and get lean fast.</p>
</div>

<div class="card">
<h3>Muscle Gain</h3>
<p>Build strength and size.</p>
</div>

</div>
</div>

<footer>
© 2026 FitRise Fitness
</footer>

</body>
</html>
